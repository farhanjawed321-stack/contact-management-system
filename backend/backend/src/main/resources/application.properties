server.port=8080

# ─── MySQL Database ───────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/contactdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Logging ──────────────────────────
logging.level.com.contactapp=DEBUG
logging.file.name=logs/app.log

# ─── JWT ──────────────────────────────
app.jwt.secret=mySuperSecretKeyForContactAppThatIsLongEnough123456!
app.jwt.expiration=86400000